project:
  name: caact-mobile
  platform: React Native (Expo)
  version: ~54.0.33
  state_management: Provider-based (UserContext only)
  persistence: AsyncStorage
  navigation: Expo Router (file-based)
  backend: none (fully local, no caact-server code present)

roles:
  - customer # no longer implements e-commerce aspects, that's for the web-only app
  - technician # can only be created by Owner
  - manager # can only be created by Owner, only included in web (keep in database, just don't implement)
  - owner # first generated by server, more can only be created by Owner

navigation:
  strategy: Expo Router (app directory)
  default_method_of_navigation:
    - bottom tabs # the most major menus
    - center action button: # action button spawns bottom sheet
        - bottom sheet # expo-router form sheet, for navigating to more minor menus
  layout_structure:
    - layout: app/debug/_layout.tsx # contains debug master switch + debugging options; omitted from production builds, accessible only via sitemap

    - layout: app/(auth)/_layout.tsx
      desired_url_routes:
        - /sign-in
        - /sign-up: # sign-up flow for new customers
          routes:
            - /sign-up/step: # multi-step sign-up flow
              routes:
                - /sign-up/step/0:
                    details:
                      - Name:
                          - First Name
                          - Last Name (optional)
                          - Suffix (optional)
                      - Shipping Address:
                          - Municipality
                          - Submunicipality
                          - Thoroughfare
                          - Property, Block, or Lot
                          - Apartment Unit
                          - Landmark(s) (optional)
                - /sign-up/step/1:
                    details:
                      - Sign-in Alias
                      - Email
                      - Password (+ confirm): must have a minimum zxcvbn score of 65 (weak)
                        estimated strength:
                          - Score ≤ 0: Bad
                          - Score < 40: Poor
                          - Score < 65: Weak
                          - Score < 100: Good
                          - Score ≥ 100: Excellent
                      - TOTP Verification: sent to the user's email
                        debug: show card above the form displaying TOTP secret in text and QR form # this is what the link sent to the user's email would've contained
                - /sign-up/step/2:
                    details:
                      - Contact Method: # one or the other
                          - Mobile Number (+63): # code timeout: 5 minutes, code resend interval: 1 minute, max 3 attempts then block for 1 day
                            debug: show card above the form displaying the code sent to the user's mobile number # this is what the code sent to the user's mobile number would've been
                          - Facebook Messenger Handle: # requires them to first message the company's Facebook page
                            debug: show card above the form displaying the code sent to the user's Facebook Messenger handle # this is what the code sent to the user's Facebook Messenger handle would've been
        - /recover: # [recover sign-in alias, reset password, use recovery code] flow, prompts user to enter email to receive reset code
          routes:
            - /recover/factor: # bottom sheet prompting user between alias recovery, password recovery, and recovery code entry
                - /recover/factor/0: # alias recovery
                  details:
                    - Email
                  debug: show card above the form displaying sign-in alias # this is what would be sent to the user's email
                - /recover/factor/1: # password recovery
                  details:
                    - Email
                  debug: show card above the form displaying password reset code
                - /recover/factor/2: # recovery code entry
                  details:
                    - Email
                    - Recovery Code
      method_of_navigation: none # stack-based, programmatic only

    - layout: app/customer/_layout.tsx
      desired_url_routes:
        - /oobe: # onboarding flow for customers
          displays:
            - 6 12 alpha-numeric single-use recovery codes
          special_routes:
            - /oobe/reset: # when recovery code is used to sign in, goes through the same TOTP onboarding flow as (auth)/sign-up but includes the TOTP secret
              displays:
                - TOTP secret in text and QR form
              details:
                - TOTP code
        - /home # displays all AC units registered under the account, if none, prompts the user to go buy at "coldair-act.online" ;; keep that link as a constant somewhere
        - /orders: # displays all orders placed by the customer from the website, if none, prompts the user to go buy at "coldair-act.online"
            - has a corresponding service request id
        - /requests: # displays all service requests created by the customer, if none, prompts the user to go to /services
            - /requests/<id>: # displays the details of a specific service request
                - /requests/<id>/unit/log/consume-qr # allows the customer to consume a technician-generated QR code to confirm the fulfillment of delivery; only available if type of service is "delivery"
        - /services # displays the company's service offerings and allows the user to request an appointment for a specified unit
        - /contact # displays the company's contact information, branch addresses (with compound plus codes), and methods for the user to get in touch
        - /settings # displays the user's profile and allows them to update their information

    - layout: app/technician/_layout.tsx
      desired_url_routes:
        - /oobe: # onboarding flow for new technicians, prompts the user to fill in additional details not provided by the Owner who made the account
          details:
            - Sign-in Alias
            - Contact number
            - Password (+ confirm)
          displays:
            - 6 12 alpha-numeric single-use recovery codes
          special_routes:
            - /oobe/reset # same as customer/oobe/reset
        - /home # displays current unit(s) being serviced, if none, prompts the user to go to /tasks
        - /tasks # lists all tasks, filtered by unit or status
        - /task/<id>/information # displays general information about the task, including unit details -- unit details include warranty status, history, and other relevant information based on the customer-submitted service request form
        - /task/<id>/unit/log/select: # lists previous service logs for this unit
            - /task/<id>/unit/log/select/<log-id> # views log details of a previous servicing
        - /task/<id>/unit/log/insert: # bottom sheet, saves as draft when closed; draft cleared on submission or manual reset
            - /task/<id>/unit/log/generate-qr # creates QR codes for newly installed units, only available if type of service is "delivery"
        - /task/<id>/unit/log/update # same as insert, but pre-populated with existing log data for editing; only available while task is active
        - /task/<id>/unit/log/delete # modal prompt, confirms deletion of log entry
        - /profile # they can change their sign-in alias, contact number, password, refresh their recovery codes

    - layout: app/manager/_layout.tsx # just do a blank screen saying "login working but not implemented" with a log out button

    - layout: app/manager/_layout.tsx # just do a blank screen saying "login working but not implemented" with a log out button

  guards:
    middleware: middleware.ts # Route-level protection (role + auth)
    hooks:
      - useRoleGuard.ts # Component-level enforcement
      - useGuestGuard.ts # Redirect logged-in users away from auth routes
  behavior:
    - middleware redirects to correct portal based on role
    - resolveHomeRoute determines initial route after login
    - unauthorized access redirects to LOGIN or role-appropriate home

authentication:
  user_context:
    storage_keys:
      users: auth_users
      current_user: auth_current_user
      login_attempts: auth_login_attempts
      audit_logs: auth_audit_logs
    features:
      - hydration_on_startup
      - default_super_admin (superadmin@coldair.local / superadmin123) # move this specification to database
      - role_normalization
      - login_attempt_tracking (3 attempts → 60s lockout)
      - audit_logging (CREATE_USER, UPDATE_USER, DELETE_USER, etc.)
    actions:
      - setCurrent
      - logout
      - retrieveUser
      - createUser
      - updateUser
      - deleteUser
      - updateProfilePhoto
      - removeProfilePhoto
      - canAttemptLogin
      - handleLoginAttempt
      - clearLockout
      - resolveHomeRoute
      - loadAuditLogs
      - clearAuditLogs
      - createAuditLog

  google_auth: REMOVED
    - No OAuth flows
    - No Google sign-in
    - No GoogleAuthContext
    - No expo-auth-session dependency
    - No Google user storage
    - All Google-related code deleted

guards:
  guest_guard:
    purpose: Prevent logged-in users from accessing auth routes
    implementation: useGuestGuard hook + middleware redirect
  role_guard:
    purpose: Enforce role-based route access
    implementation: useRoleGuard hook + middleware
    behavior:
      - Checks current user role against allowedRoles
      - Redirects to fallbackRoute (default: LOGIN) if unauthorized
      - Redirects to home if user status is not "active"

customer_journey:
  shopping:
    route: app/(customer)/(tabs)/shop.tsx
    features:
      - Browse active products
      - Search by name/description/category/brand
      - Add to cart (stock validation)
    storage: product_catalog_v3
    default_products_count: 8

  cart:
    route: app/(customer)/(tabs)/cart.tsx
    features:
      - Load user-specific cart
      - Validate stock against inventory
      - Adjust quantities
      - Remove items
      - Calculate subtotals
    storage_key_pattern: cart_storage_v2_{email}
    guest_key: cart_storage_v2_guest

  checkout:
    route: app/(customer)/(tabs)/checkout.tsx
    flow:
      - Collect delivery info (name, email, phone, address, landmark, plusCode, instructions)
      - Optional: auto-detect location
      - Select payment method (COD, Bank Transfer, etc.)
      - Upload payment proof if required
      - Validate cart stock
      - Place order
      - Reduce product stock
      - Clear cart
      - Navigate to OrderReceipt
    order_lifecycle:
      - PENDING
      - APPROVED
      - REJECTED
      - RELEASED
      - CANCELLED
    delivery_status:
      - NOT_STARTED
      - PREPARING
      - OUT_FOR_DELIVERY
      - DELIVERED
      - FAILED_ATTEMPT
    payment_status:
      - COD_PENDING
      - PENDING_VERIFICATION
      - VERIFIED
      - FAILED
      - NOT_REQUIRED
    storage: orders_storage_v1

technician_workflow:
  dashboard:
    route: app/(technician)/(tabs)/dashboard.tsx
    features:
      - View stats (total, pending, in_progress, completed tasks)
      - Parts request count
      - Quick actions (tasks, scan QR, request parts)

  task_management:
    route: app/(technician)/(tabs)/tasks.tsx
    lifecycle:
      - PENDING
      - IN_PROGRESS
      - COMPLETED
      - CANCELLED
    features:
      - List assigned tasks
      - Start task
      - Complete task (with service report)
      - Service report fields:
          - Before condition
          - Findings
          - Resolution
          - After condition
          - Parts used
          - Labor cost
          - Parts cost
          - Additional cost
          - Total service cost
          - Next maintenance date
          - Customer advice
          - Notes
    storage: technician_tasks_storage_v2

  qr_lookup:
    route: app/(technician)/(tabs)/scan-qr.tsx
    features:
      - Enter/scan unit ID, serial number, or QR code
      - Display unit details
      - Show related service requests
      - Show related technician tasks
      - AI health score and lifecycle prediction
    storage:
      - units_storage_v1
      - service_requests_storage_v2
      - technician_tasks_storage_v2

  parts_requests:
    features:
      - Request parts for tasks
      - Status flow: Submitted → Reviewed → Assigned → Completed → Cancelled
      - Linked to inventory items
    storage: parts_requests_storage_v2

admin_operations:
  dashboard:
    route: app/(admin)/(stack)/dashboard.tsx
    analytics:
      sales:
        - Total revenue
        - Pending/completed orders
        - Monthly order counts (6-month trend)
        - Monthly revenue trend
        - Order status distribution
        - Delivery status distribution
        - Payment method distribution
        - Top selling products
        - Data integrity warnings
      service:
        - Request counts by status
        - Task completion stats
        - Average completion time
        - Technician workload
        - Top issue types
        - Monthly request trends
      inventory:
        - Total SKUs
        - Total stock units
        - Low stock count
        - Out of stock count
        - Inventory value
        - Most requested parts

  inventory_management:
    features:
      - CRUD inventory items (SKU, name, brand, category)
      - Track: stock, minStock, price, cost
      - Auto-dedupe (removes placeholder products)
      - Stock adjustment
      - Low stock alerts
    storage: inventory_storage_v2
    default_products_count: 8

  reorder_management:
    flow:
      - Create reorder order (item, quantity, supplier)
      - Status: Draft → Ordered → Received → Cancelled
      - On receive: auto-adjust inventory stock
      - Track costs
    storage: reorder_orders_storage_v2

super_admin_capabilities:
  - User management (view all users)
  - Audit logs (full action history)
  - System settings
  - Full inventory/product access
  - Data integrity checks

data_persistence:
  strategy: AsyncStorage (local-only, offline-first)
  keys:
    users: auth_users
    current_user: auth_current_user
    login_attempts: auth_login_attempts
    audit_logs: auth_audit_logs
    products: product_catalog_v3
    cart_pattern: cart_storage_v2_*
    orders: orders_storage_v1
    units: units_storage_v1
    service_requests: service_requests_storage_v2
    tasks: technician_tasks_storage_v2
    inventory: inventory_storage_v2
    parts_requests: parts_requests_storage_v2
    reorders: reorder_orders_storage_v2

business_rules:
  - role_isolation: Users restricted to designated portal
  - account_lockout: 3 failed attempts → 60s lockout per email
  - stock_validation: Real-time stock check at checkout
  - revenue_recognition: Orders count as revenue when APPROVED/RELEASED or DELIVERED
  - task_request_sync: Completing linked task auto-completes request
  - super_admin_protection: Cannot be deleted
  - google_auth_routing: REMOVED
  - inventory_dedupe: Placeholder products removed on load
  - audit_trail: All CRUD operations logged
  - health_scoring: AI predicts unit lifecycle (age, maintenance, placement, requests)

backend_status:
  caact_server: empty (virtual environment only, no code)
  architecture: fully local/offline
  cloud_sync: none
  api: none

key_metrics:
  default_super_admin: superadmin@coldair.local / superadmin123
  default_products: 8
  login_attempt_limit: 3
  lockout_duration: 60 seconds
  health_score_thresholds:
    excellent: ">= 85"
    good: ">= 70"
    warning: ">= 50"
    critical: "< 50"

dependencies_to_remove:
  - expo-auth-session
  - expo-google-auth (implied)
  - react-native-gesture-handler (if not used elsewhere)
  - react-native-get-random-values (if only used by Google auth)

dependencies_to_add:
  - expo-router (native)
  - expo-linking
  - expo-constants

database_requirements:
  implements:
    - seeded_accounts:
        - customer: c@coldair-act.debug / caact!123
        - technician: t@coldair-act.debug / caact!123
        - manager: m@coldair-act.debug / caact!123
        - owner: o@coldair-act.debug / caact!123
